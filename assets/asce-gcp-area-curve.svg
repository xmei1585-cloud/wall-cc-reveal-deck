<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 430" role="img" aria-labelledby="title desc">
  <title id="title">External pressure coefficient curves</title>
  <desc id="desc">Reference-style graph of external pressure coefficient GCp versus effective wind area with zones 4 and 5.</desc>
  <rect width="540" height="430" fill="#fff"/>
  <g transform="translate(118 40)">
    <rect x="0" y="0" width="330" height="280" fill="#fff" stroke="#222" stroke-width="2"/>
    <g stroke="#222" stroke-width="1.2" opacity="0.92">
      <line x1="0" y1="23" x2="330" y2="23"/>
      <line x1="0" y1="47" x2="330" y2="47"/>
      <line x1="0" y1="70" x2="330" y2="70"/>
      <line x1="0" y1="93" x2="330" y2="93"/>
      <line x1="0" y1="117" x2="330" y2="117"/>
      <line x1="0" y1="140" x2="330" y2="140"/>
      <line x1="0" y1="163" x2="330" y2="163"/>
      <line x1="0" y1="187" x2="330" y2="187"/>
      <line x1="0" y1="210" x2="330" y2="210"/>
      <line x1="0" y1="233" x2="330" y2="233"/>
      <line x1="0" y1="257" x2="330" y2="257"/>
      <line x1="55" y1="0" x2="55" y2="280"/>
      <line x1="110" y1="0" x2="110" y2="280"/>
      <line x1="145" y1="0" x2="145" y2="280"/>
      <line x1="178" y1="0" x2="178" y2="280"/>
      <line x1="215" y1="0" x2="215" y2="280"/>
      <line x1="265" y1="0" x2="265" y2="280"/>
      <line x1="300" y1="0" x2="300" y2="280"/>
    </g>
    <g fill="none" stroke="#202020" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="0,46 110,46 178,80 265,113 330,113"/>
      <polyline points="0,72 110,72 178,88 265,107 330,113"/>
      <polyline points="0,210 110,210 178,198 265,180 330,164"/>
    </g>
    <g fill="#fff" stroke="#202020" stroke-width="2">
      <circle cx="20" cy="47" r="13"/>
      <circle cx="20" cy="73" r="13"/>
      <circle cx="20" cy="209" r="13"/>
    </g>
    <g fill="#202020" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
      <text x="20" y="52">5</text>
      <text x="20" y="78">4</text>
      <text x="20" y="214">4 &amp; 5</text>
    </g>
    <g fill="#202020" font-family="Arial, sans-serif" font-size="15" text-anchor="end">
      <text x="-10" y="5">-1.8</text>
      <text x="-10" y="28">-1.6</text>
      <text x="-10" y="52">-1.4</text>
      <text x="-10" y="75">-1.2</text>
      <text x="-10" y="98">-1.0</text>
      <text x="-10" y="122">-0.8</text>
      <text x="-10" y="145">-0.6</text>
      <text x="-10" y="168">-0.4</text>
      <text x="-10" y="192">-0.2</text>
      <text x="-10" y="215">0</text>
      <text x="-10" y="238">+0.2</text>
      <text x="-10" y="262">+0.4</text>
      <text x="-10" y="285">+0.6</text>
    </g>
    <g fill="#202020" font-family="Arial, sans-serif" font-size="15" text-anchor="middle">
      <text x="0" y="306">1</text>
      <text x="110" y="306">10</text>
      <text x="178" y="306">50</text>
      <text x="215" y="306">100</text>
      <text x="265" y="306">500</text>
      <text x="330" y="306">1000</text>
      <text x="0" y="326">(0.1)</text>
      <text x="110" y="326">(0.9)</text>
      <text x="178" y="326">(4.6)</text>
      <text x="215" y="326">(9.3)</text>
      <text x="265" y="326">(46.5)</text>
      <text x="330" y="326">(92.9)</text>
      <text x="110" y="-12">10</text>
      <text x="265" y="-12">500</text>
    </g>
    <g fill="#202020" font-family="Arial, sans-serif" font-size="18" font-weight="700">
      <text x="-75" y="170" transform="rotate(-90 -75 170)">External Pressure Coefficient, (GCp)</text>
      <text x="15" y="370">Effective Wind Area, ft² (m²)</text>
    </g>
    <g fill="#202020" font-family="Arial, sans-serif" font-size="17" text-anchor="start">
      <text x="344" y="51">-1.4</text>
      <text x="344" y="78">-1.1</text>
      <text x="344" y="118">-0.8</text>
      <text x="344" y="168">+0.7</text>
      <text x="344" y="214">+1.0</text>
    </g>
  </g>
</svg>
